services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [leadgen]

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks: [leadgen]

  celery-worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks: [leadgen]

  celery-beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks: [leadgen]

  flower:
    image: mher/flower
    command: celery flower --broker=redis://redis:6379/0
    restart: unless-stopped
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks: [leadgen]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [leadgen]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [leadgen]

volumes:
  redis-data:

networks:
  leadgen:
    driver: bridge
